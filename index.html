<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Europe Quest</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
transition:0.5s;
}

.container{
width:90%;
max-width:900px;
background:rgba(0,0,0,.65);
padding:25px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(5px);
}

.hidden{
display:none;
}

#progress{
width:100%;
height:20px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

#bar{
width:0%;
height:100%;
background:gold;
}

button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
transform:scale(1.03);
}

#status{
display:flex;
justify-content:space-between;
font-size:22px;
margin:15px 0;
}

#timer{
font-size:25px;
color:gold;
margin:10px;
}

#message{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

#trophy{
font-size:150px;
animation:spin 4s linear infinite;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

.cover{
width:100%;
max-width:500px;
border-radius:15px;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<!-- START SCREEN -->

<div id="startScreen">

<img src="images/cover.jpg" class="cover">

<h1>🌍 EUROPE QUEST</h1>

<p>Explore Europe and become the Europe Master!</p>

<br>

<input
id="playerName"
placeholder="Enter your name"
style="
padding:10px;
width:70%;
border-radius:10px;
border:none;">

<br><br>

<button onclick="startGame()">
START GAME
</button>

</div>

<!-- GAME -->

<div id="gameScreen" class="hidden">

<h1>🎮 EUROPE QUEST</h1>

<div id="progress">
<div id="bar"></div>
</div>

<div id="status">

<div id="lives">
❤️❤️❤️
</div>

<div id="xp">
XP: 0
</div>

</div>

<div id="timer">
⏱️ 15
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<div id="message"></div>

</div>

<!-- END -->

<div id="endScreen" class="hidden">

<h1 id="endTitle"></h1>

<div id="trophy">
🏆
</div>

<h2 id="finalScore"></h2>

<br>

<button onclick="location.reload()">
PLAY AGAIN
</button>

</div>

</div>

<audio id="correctSound" src="sounds/correct.mp3"></audio>
<audio id="wrongSound" src="sounds/wrong.mp3"></audio>
<audio id="victorySound" src="sounds/victory.mp3"></audio>

<script>

const backgrounds = [

"images/europe-map.jpg",
"images/atlantic-ocean.jpg",
"images/eu-flag.jpg",
"images/berlin.jpg",
"images/italy.jpg",
"images/colosseum.jpg",
"images/eiffel-tower.jpg",
"images/alps.jpg",
"images/europe-countries.jpg",
"images/european-union.jpg"

];

const questions = [

{
question:"Where is Europe located?",
answers:[
"Northern Hemisphere",
"Southern Hemisphere",
"Africa",
"Asia"
],
correct:0
},

{
question:"What ocean borders Europe to the west?",
answers:[
"Atlantic Ocean",
"Pacific Ocean",
"Indian Ocean",
"Arctic Ocean"
],
correct:0
},

{
question:"How many stars are on the European Union flag?",
answers:[
"10",
"12",
"15",
"20"
],
correct:1
},

{
question:"Which language is common in Europe?",
answers:[
"German",
"Japanese",
"Hindi",
"Chinese"
],
correct:0
},

{
question:"Which country is famous for pizza and pasta?",
answers:[
"France",
"Germany",
"Italy",
"Spain"
],
correct:2
},

{
question:"Which civilization influenced European philosophy and politics?",
answers:[
"Roman Empire",
"Maya",
"Inca",
"Aztec"
],
correct:0
},

{
question:"Where is the Eiffel Tower located?",
answers:[
"Italy",
"Spain",
"France",
"Germany"
],
correct:2
},

{
question:"Which mountain range is in Europe?",
answers:[
"Andes",
"Alps",
"Rockies",
"Himalayas"
],
correct:1
},

{
question:"Europe has more than...",
answers:[
"10 countries",
"20 countries",
"40 countries",
"30 countries"
],
correct:2
},

{
question:"What do the stars on the EU flag represent?",
answers:[
"War",
"Tourism",
"Money",
"Unity and Harmony"
],
correct:3
}

];

let currentQuestion = 0;
let lives = 3;
let xp = 0;
let timer = 15;
let interval;

function startGame(){

document.getElementById("startScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

loadQuestion();

}

function loadQuestion(){

document.body.style.backgroundImage =
`url(${backgrounds[currentQuestion]})`;

clearInterval(interval);

timer = 15;

document.getElementById("timer").innerHTML =
"⏱️ " + timer;

interval = setInterval(()=>{

timer--;

document.getElementById("timer").innerHTML =
"⏱️ " + timer;

if(timer<=0){

wrongAnswer();

}

},1000);

let q = questions[currentQuestion];

document.getElementById("question").innerHTML =
q.question;

let answersDiv =
document.getElementById("answers");

answersDiv.innerHTML="";

q.answers.forEach((answer,index)=>{

let btn =
document.createElement("button");

btn.innerHTML = answer;

btn.onclick = ()=>checkAnswer(index);

answersDiv.appendChild(btn);

});

updateUI();

}

function checkAnswer(index){

clearInterval(interval);

if(index===questions[currentQuestion].correct){

xp+=100;

correctSound.play();

message.innerHTML =
"✅ Mission Complete!";

setTimeout(nextQuestion,1000);

}
else{

wrongAnswer();

}

}

function wrongAnswer(){

clearInterval(interval);

lives--;

wrongSound.play();

message.innerHTML =
"❌ Wrong Answer";

updateUI();

if(lives<=0){

setTimeout(()=>endGame(false),1000);

}
else{

setTimeout(nextQuestion,1000);

}

}

function nextQuestion(){

message.innerHTML="";

currentQuestion++;

if(currentQuestion>=questions.length){

endGame(true);
return;

}

loadQuestion();

}

function updateUI(){

livesDiv.innerHTML =
"❤️".repeat(lives);

xpDiv.innerHTML =
"XP: " + xp;

bar.style.width =
(currentQuestion/questions.length*100)+"%";

}

function endGame(win){

gameScreen.classList.add("hidden");
endScreen.classList.remove("hidden");

if(win){

victorySound.play();

endTitle.innerHTML =
"🏆 YOU WON THE GAME!";

}
else{

endTitle.innerHTML =
"💀 GAME OVER";

}

finalScore.innerHTML =
"Final XP: " + xp;

}

</script>

</body>
</html>
