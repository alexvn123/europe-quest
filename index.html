<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="juego-contenedor">
        <!-- Panel de información -->
        <div class="panel-info">
            <div class="puntos">Puntos: <span id="puntos">0</span></div>
            <div class="vidas">Vidas: <span id="vidas">3</span></div>
        </div>

        <!-- Mapa del juego -->
        <div class="mapa" id="mapa">
            <img src="imagenes/mapa-fondo.jpg" alt="Mapa Europa" class="fondo-mapa">
            
            <!-- Puntos de ciudades -->
            <div class="punto-ciudad" data-nivel="1" data-ciudad="París" style="top: 45%; left: 30%;">1</div>
            <div class="punto-ciudad" data-nivel="2" data-ciudad="Londres" style="top: 35%; left: 25%;">2</div>
            <div class="punto-ciudad" data-nivel="3" data-ciudad="Madrid" style="top: 65%; left: 28%;">3</div>
            <div class="punto-ciudad" data-nivel="4" data-ciudad="Roma" style="top: 55%; left: 50%;">4</div>
            <div class="punto-ciudad" data-nivel="5" data-ciudad="Berlín" style="top: 40%; left: 55%;">5</div>
            <div class="punto-ciudad" data-nivel="6" data-ciudad="Lisboa" style="top: 70%; left: 20%;">6</div>

            <!-- Personaje -->
            <div class="personaje" id="personaje"></div>
        </div>

        <!-- Ventana de preguntas -->
        <div class="ventana-pregunta" id="ventanaPregunta">
            <h3>¿En qué ciudad estás?</h3>
            <p id="textoCiudad"></p>
            <div class="opciones" id="opciones"></div>
            <button onclick="cerrarPregunta()">Cerrar</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
