<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe Quest 🗺️</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <img src="imagenes/euro-map.jpg" alt="Europe Map" id="header-img">
        <h1>🗺️ EUROPE QUEST</h1>
    </header>

    <!-- Pantalla de inicio -->
    <div id="startScreen" class="screen">
        <img src="imagenes/eu-flag.jpg" alt="EU Flag" class="small-img">
        <h2>Welcome! Enter your name</h2>
        <input type="text" id="playerName" placeholder="Your name here" required>

        <h3>Select Level:</h3>
        <select id="levelSelect">
            <option value="1">Level 1</option>
            <option value="2">Level 2</option>
            <option value="3">Level 3</option>
            <option value="4">Level 4</option>
            <option value="5">Level 5</option>
            <option value="6">Level 6</option>
            <option value="7">Level 7</option>
            <option value="8">Level 8</option>
            <option value="9">Level 9</option>
            <option value="10">Level 10</option>
        </select>

        <button onclick="startGame()">Start Game</button>
    </div>

    <!-- Pantalla del juego -->
    <div id="gameScreen" class="screen hidden">
        <div class="stats">
            <span>Player: <span id="displayName"></span></span>
            <span>Level: <span id="currentLevel"></span></span>
            <span>Lives: ❤️ <span id="lives">3</span></span>
            <span>Score: <span id="score">0</span></span>
            <span>Time: <span id="timer">15</span>s</span>
        </div>

        <div id="questionBox">
            <div id="questionImage"></div>
            <h3 id="questionText"></h3>
            <div class="options" id="optionsContainer"></div>
        </div>
    </div>

    <!-- Pantalla de resultado -->
    <div id="endScreen" class="screen hidden">
        <img src="imagenes/europe-countries.jpg" alt="Result" class="small-img">
        <h2 id="resultTitle"></h2>
        <p id="resultText"></p>
        <button onclick="restartGame()">Back to Menu</button>
    </div>

    <!-- Tabla de progreso -->
    <div class="screen">
        <h3>🏆 Player Progress & Best Scores</h3>
        <table id="scoresTable">
            <thead>
                <tr>
                    <th>Player</th>
                    <th>Max Level Reached</th>
                    <th>Best Score</th>
                </tr>
            </thead>
            <tbody id="scoresBody"></tbody>
        </table>
    </div>

    <script src="game.js"></script>
</body>
</html>
