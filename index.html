<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Europe Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Start Screen -->
    <div id="startScreen" class="start-screen">
        <h1>EUROPE QUEST</h1>
        <p>Answer correctly to advance through your adventure</p>
        <input type="text" id="playerName" placeholder="Enter your name to play" required>
        <button onclick="startGame()" class="play-button">START ADVENTURE</button>
        <button onclick="openScores()" class="scores-button">VIEW ALL SCORES</button>
    </div>

    <!-- Main Game -->
    <div id="game" class="game" style="display: none;">
        <div class="top-panel">
            <div>👤 Player: <span id="displayName">Guest</span></div>
            <div>⭐ Points: <span id="points">0</span></div>
            <div>❤️ Lives: <span id="lives">3</span></div>
            <div>⏱️ Time: <span id="timeLeft">15</span>s</div>
        </div>

        <div class="map-container">
            <img src="imagenes/euro-map.jpg" alt="Map" class="background-map">
            <div class="level locked" data-level="1" style="top: 18%; left: 20%;">1</div>
            <div class="level locked" data-level="2" style="top: 18%; left: 70%;">2</div>
            <div class="level locked" data-level="3" style="top: 32%; left: 70%;">3</div>
            <div class="level locked" data-level="4" style="top: 32%; left: 20%;">4</div>
            <div class="level locked" data-level="5" style="top: 46%; left: 20%;">5</div>
            <div class="level locked" data-level="6" style="top: 46%; left: 70%;">6</div>
            <div class="level locked" data-level="7" style="top: 60%; left: 70%;">7</div>
            <div class="level locked" data-level="8" style="top: 60%; left: 20%;">8</div>
            <div class="level locked" data-level="9" style="top: 74%; left: 20%;">9</div>
            <div class="level locked" data-level="10" style="top: 74%; left: 70%;">10</div>
        </div>

        <!-- Question Modal -->
        <div id="questionModal" class="modal">
            <h3 id="questionText"></h3>
            <img id="questionImage" alt="Question" class="modal-img">
            <div id="optionsContainer"></div>
            <button onclick="closeQuestion()">Close</button>
        </div>

        <!-- Victory Modal -->
        <div id="victoryModal" class="modal">
            <h2>🏆 CONGRATULATIONS!</h2>
            <p>Final Score: <strong id="finalScore"></strong></p>
            <button onclick="returnToMenu()">Back to Menu</button>
        </div>

        <!-- 📊 TABLA DE PUNTUACIÓN CON MEDALLAS -->
        <div id="scoresModal" class="scores-modal">
            <h2>🏆 PLAYERS SCORES</h2>
            <p class="subtitle">Best results saved</p>

            <table id="scoresTable">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Player Name</th>
                        <th>Max Level</th>
                        <th>Total Points</th>
                    </tr>
                </thead>
                <tbody id="scoresBody">
                    <!-- Datos se cargan automáticamente aquí -->
                </tbody>
            </table>

            <button onclick="closeScores()" class="back-btn">Back to Menu</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
