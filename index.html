<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europe Quest</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0a1f44,#1e3c72);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    width:90%;
    max-width:900px;
    background:rgba(0,0,0,0.5);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

h1{
    margin-bottom:15px;
}

#status{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
    font-size:20px;
}

#progress{
    width:100%;
    height:20px;
    background:#444;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

#bar{
    height:100%;
    width:0%;
    background:gold;
}

button{
    width:100%;
    padding:15px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.02);
}

.correct{
    background:green;
    color:white;
}

.wrong{
    background:red;
    color:white;
}

#message{
    margin-top:15px;
    font-size:24px;
    font-weight:bold;
}

#trophy{
    font-size:120px;
    animation:spin 4s linear infinite;
}

.hidden{
    display:none;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

input{
    padding:10px;
    width:70%;
    border-radius:10px;
    border:none;
}

#timer{
    font-size:24px;
    margin:10px;
    color:gold;
}
</style>
</head>

<body>

<div class="container">

<div id="startScreen">

<h1>🎮 EUROPE QUEST</h1>

<p>Explore Europe and become the Europe Master!</p>

<br>

<input type="text" id="playerName" placeholder="Enter your name">

<br><br>

<button onclick="startGame()">START ADVENTURE</button>

</div>

<div id="gameScreen" class="hidden">

<h1>🌍 EUROPE QUEST</h1>

<div id="progress">
<div id="bar"></div>
</div>

<div id="status">
<div id="lives">❤️❤️❤️</div>
<div id="xp">XP: 0</div>
</div>

<div id="timer">⏱️ 15</div>

<h2 id="question"></h2>

<div id="answers"></div>

<div id="message"></div>

</div>

<div id="endScreen" class="hidden">

<h1 id="finalTitle"></h1>

<div id="trophy">🏆</div>

<h2 id="finalScore"></h2>

<br>

<button onclick="location.reload()">PLAY AGAIN</button>

</div>

</div>

<script>

const questions = [

{
question:"Where is Europe located?",
answers:["Northern Hemisphere","Southern Hemisphere","Africa","Asia"],
correct:0
},

{
question:"What ocean borders Europe to the west?",
answers:["Atlantic Ocean","Pacific Ocean","Indian Ocean","Southern Ocean"],
correct:0
},

{
question:"How many stars are on the European Union flag?",
answers:["10","12","15","20"],
correct:1
},

{
question:"Which language is common in Europe?",
answers:["German","Japanese","Hindi","Chinese"],
correct:0
},

{
question:"Which country is famous for pizza and pasta?",
answers:["France","Germany","Italy","Spain"],
correct:2
},

{
question:"Which civilization influenced European philosophy and politics?",
answers:["Roman Empire","Maya","Inca","Aztec"],
correct:0
},

{
question:"Where is the Eiffel Tower located?",
answers:["Italy","Spain","France","Germany"],
correct:2
},

{
question:"Which mountain range is in Europe?",
answers:["Andes","Alps","Rockies","Himalayas"],
correct:1
},

{
question:"Europe has more than...",
answers:["10 countries","20 countries","40 countries","30 countries"],
correct:2
},

{
question:"What do the stars on the EU flag represent?",
answers:["War","Tourism","Money","Unity and Harmony"],
correct:3
}

];

let currentQuestion=0;
let lives=3;
let xp=0;
let timer=15;
let interval;

function startGame(){

document.getElementById("startScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

loadQuestion();

}

function loadQuestion(){

clearInterval(interval);

timer=15;

document.getElementById("timer").textContent="⏱️ "+timer;

interval=setInterval(()=>{

timer--;

document.getElementById("timer").textContent="⏱️ "+timer;

if(timer<=0){

clearInterval(interval);

loseLife();

}

},1000);

const q=questions[currentQuestion];

document.getElementById("question").textContent=q.question;

const answersDiv=document.getElementById("answers");

answersDiv.innerHTML="";

q.answers.forEach((answer,index)=>{

const btn=document.createElement("button");

btn.textContent=answer;

btn.onclick=()=>checkAnswer(index);

answersDiv.appendChild(btn);

});

updateBar();

}

function checkAnswer(index){

clearInterval(interval);

if(index===questions[currentQuestion].correct){

xp+=100;

document.getElementById("message").innerHTML="✅ Mission Complete! +100 XP";

}else{

lives--;

document.getElementById("message").innerHTML="❌ Wrong Answer";

updateLives();

}

nextQuestion();

}

function loseLife(){

lives--;

updateLives();

document.getElementById("message").innerHTML="⏱️ Time's Up!";

nextQuestion();

}

function updateLives(){

let hearts="";

for(let i=0;i<lives;i++){

hearts+="❤️";

}

document.getElementById("lives").innerHTML=hearts;

}

function updateBar(){

let percent=(currentQuestion/questions.length)*100;

document.getElementById("bar").style.width=percent+"%";

document.getElementById("xp").innerHTML="XP: "+xp;

}

function nextQuestion(){

if(lives<=0){

endGame(false);

return;

}

currentQuestion++;

if(currentQuestion>=questions.length){

endGame(true);

return;

}

setTimeout(loadQuestion,1200);

}

function endGame(win){

document.getElementById("gameScreen").classList.add("hidden");

document.getElementById("endScreen").classList.remove("hidden");

if(win){

document.getElementById("finalTitle").innerHTML="🏆 EUROPE MASTER";

}else{

document.getElementById("finalTitle").innerHTML="💀 GAME OVER";

}

document.getElementById("finalScore").innerHTML="Final XP: "+xp;

}

</script>

</body>
</html>
