<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Europe Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- PANTALLA DE INICIO -->
    <div id="pantallaInicio" class="pantalla-inicio">
        <h1>EUROPE QUEST</h1>
        <p>Responde bien para avanzar en tu aventura</p>
        <button onclick="iniciarJuego()" class="boton-jugar">COMENZAR AVENTURA</button>
    </div>

    <!-- JUEGO PRINCIPAL -->
    <div id="juego" class="juego" style="display: none;">
        <!-- Panel superior -->
        <div class="panel-superior">
            <div class="puntos">⭐ Puntos: <span id="puntos">0</span></div>
            <div class="vidas">❤️ Vidas: <span id="vidas">3</span></div>
        </div>

        <!-- MAPA CON LA IMAGEN DE FONDO Y RECORRIDO -->
        <div class="mapa-contenedor">
            <!-- Imagen de fondo -->
            <img src="imagenes/mapa-aventura.jpg" alt="Mapa de Aventura" class="fondo-mapa">

            <!-- Camino dorado siguiendo tu recorrido -->
            <svg class="camino" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M 22 18 L 68 18 L 68 32 L 22 32 L 22 46 L 68 46 L 68 60 L 22 60 L 22 74 L 68 74" 
                      fill="none" stroke="#ffd700" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="drop-shadow(0 0 5px rgba(255,215,0,0.7))" />
            </svg>

            <!-- Niveles en orden exacto -->
            <div class="nivel bloqueado" data-nivel="1" style="top: 18%; left: 22%;">1</div>
            <div class="nivel bloqueado" data-nivel="2" style="top: 18%; left: 68%;">2</div>
            <div class="nivel bloqueado" data-nivel="3" style="top: 32%; left: 68%;">3</div>
            <div class="nivel bloqueado" data-nivel="4" style="top: 32%; left: 22%;">4</div>
            <div class="nivel bloqueado" data-nivel="5" style="top: 46%; left: 22%;">5</div>
            <div class="nivel bloqueado" data-nivel="6" style="top: 46%; left: 68%;">6</div>
            <div class="nivel bloqueado" data-nivel="7" style="top: 60%; left: 68%;">7</div>
            <div class="nivel bloqueado" data-nivel="8" style="top: 60%; left: 22%;">8</div>
            <div class="nivel bloqueado" data-nivel="9" style="top: 74%; left: 22%;">9</div>
            <div class="nivel bloqueado" data-nivel="10" style="top: 74%; left: 68%;">10</div>
        </div>

        <!-- Ventana de preguntas -->
        <div id="ventanaPregunta" class="ventana-pregunta">
            <h3 id="textoPregunta"></h3>
            <div id="opciones" class="opciones"></div>
            <button onclick="cerrarPregunta()">Cerrar</button>
        </div>

        <!-- Sonidos -->
        <audio id="sonidoCorrecto" preload="auto">
            <source src="sounds/correct.mp3" type="audio/mpeg">
        
        <audio id="sonidoIncorrecto" preload="auto">
            <source src="sounds/wrong.mp3" type="audio/mpeg">
        
    </div>

    <script src="game.js"></script>
</body>
</html>
