<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe Quest 🗺️</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <img src="imagenes/euro-map.jpg" alt="Europe Map" id="header-img">
        <h1>🗺️ EUROPE QUEST</h1>
    </header>

    <!-- Pantalla de inicio -->
    <div id="startScreen" class="screen">
        <img src="imagenes/eu-flag.jpg" alt="EU Flag" class="small-img">
        <h2>Welcome! Enter your name to play</h2>
        <input type="text" id="playerName" placeholder="Your name here" required>
        <button onclick="startGame()">Start Game</button>
    </div>

    <!-- Pantalla del juego -->
    <div id="gameScreen" class="screen hidden">
        <div class="stats">
            <span>Player: <span id="displayName"></span></span>
            <span>Lives: ❤️ <span id="lives">3</span></span>
            <span>Score: <span id="score">0</span></span>
            <span>Time: <span id="timer">15</span>s</span>
        </div>

        <div id="questionBox">
            <h3 id="questionText"></h3>
            <div id="questionImage"></div>
            <div class="options" id="optionsContainer"></div>
        </div>
    </div>

    <!-- Pantalla final -->
    <div id="endScreen" class="screen hidden">
        <img src="imagenes/europe-countries.jpg" alt="Europe" class="small-img">
        <h2>Game Over!</h2>
        <p>Your final score: <strong id="finalScore"></strong></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <!-- Tabla de puntajes -->
    <div class="screen">
        <h3>🏆 High Scores</h3>
        <table id="scoresTable">
            <thead>
                <tr>
                    <th>Player</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="scoresBody"></tbody>
        </table>
    </div>

    <script src="game.js"></script>
</body>
</html>
