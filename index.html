<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Europe Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Panel superior -->
    <div class="header">
        <div class="puntos">Puntos: <span id="puntos">0</span></div>
        <div class="vidas">Vidas: <span id="vidas">3</span></div>
    </div>

    <!-- Área del mapa -->
    <div class="mapa">
        <!-- Puntos de niveles en las posiciones exactas de tu captura -->
        <div class="punto" data-nivel="1" style="top: 22%; left: 45%;">1</div>
        <div class="punto" data-nivel="2" style="top: 30%; left: 32%;">2</div>
        <div class="punto" data-nivel="3" style="top: 72%; left: 35%;">3</div>
        <div class="punto" data-nivel="4" style="top: 60%; left: 60%;">4</div>
        <div class="punto" data-nivel="5" style="top: 42%; left: 65%;">5</div>
        <div class="punto" data-nivel="6" style="top: 78%; left: 25%;">6</div>
    </div>

    <!-- Ventana de preguntas -->
    <div id="ventana" class="ventana">
        <h3 id="pregunta-texto"></h3>
        <img id="imagen" src="" alt="Imagen" class="imagen">
        <div id="opciones" class="opciones"></div>
        <button onclick="cerrarVentana()">Cerrar</button>
    </div>

    <!-- Sonidos -->
    <audio id="sonido-correcto" src="sounds/correct.mp3" preload="auto">
    <audio id="sonido-incorrecto" src="sounds/wrong.mp3" preload="auto">
    <audio id="sonido-fin" src="sounds/victory.mp3" preload="auto">

    <script src="game.js"></script>
</body>
</html>
